<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telephone Number Validator</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div id="header">
        <img id="banner" src="assets\banner.png" alt="img not found!">
        <h1 id="title">United States Telephone Number Validator</h1>
        <p id="instructions">Please enter a phone number, or any text and we will check if your entered value is a valid
            phone number in the United States!</p>
    </div>
    <div id="checker">
        <p id="textbox-label">Enter a Phone Number:</p>
        <input id="textInput" type="text"></input>
        <button id="check-button">Check</button>
        <button id="clear-button">Clear</button>

    </div>
    <div id="history">
        <ul id="history">

        </ul>
    </div>
</body>

</html>
